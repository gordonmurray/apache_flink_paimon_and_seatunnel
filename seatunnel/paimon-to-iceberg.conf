env {
  execution.parallelism = 1
  job.mode = "BATCH"
}

# Read the Paimon myproducts table that Flink wrote to SeaweedFS.
source {
  Paimon {
    plugin_output = "products"
    warehouse = "s3a://paimon/warehouse"
    database = "paimon_database"
    table = "myproducts"
    paimon.hadoop.conf = {
      fs.s3a.endpoint = "http://seaweedfs:9000"
      fs.s3a.access-key = "admin"
      fs.s3a.secret-key = "adminsecret"
      fs.s3a.path.style.access = "true"
      fs.s3a.aws.credentials.provider = "org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider"
    }
  }
}

# Add a price_band column so the SeaTunnel step does some visible work.
transform {
  Sql {
    plugin_input = "products"
    plugin_output = "products_banded"
    query = "select id, name, price, case when price < 5 then 'budget' when price < 10 then 'mid' else 'premium' end as price_band from products"
  }
}

# Write the transformed rows into an Iceberg table on SeaweedFS using a Hadoop catalog.
sink {
  Iceberg {
    plugin_input = "products_banded"
    catalog_name = "iceberg_catalog"
    iceberg.catalog.config = {
      type = "hadoop"
      warehouse = "s3a://iceberg/warehouse"
    }
    hadoop.config = {
      fs.s3a.endpoint = "http://seaweedfs:9000"
      fs.s3a.access.key = "admin"
      fs.s3a.secret.key = "adminsecret"
      fs.s3a.path.style.access = "true"
      fs.s3a.aws.credentials.provider = "org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider"
    }
    namespace = "iceberg_db"
    table = "products"
    iceberg.table.write-props = {
      write.format.default = "parquet"
    }
    schema_save_mode = "CREATE_SCHEMA_WHEN_NOT_EXIST"
    data_save_mode = "DROP_DATA"
  }
}
