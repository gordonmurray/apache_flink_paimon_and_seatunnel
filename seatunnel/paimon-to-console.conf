env {
  execution.parallelism = 1
  job.mode = "BATCH"
}

# Reads the Paimon myproducts table that the Flink CDC job wrote to SeaweedFS.
# The warehouse, database and table line up with jobs/job.sql, and the S3
# settings point at the local SeaweedFS instance.
source {
  Paimon {
    warehouse = "s3a://paimon/warehouse"
    database = "paimon_database"
    table = "myproducts"
    paimon.hadoop.conf = {
      fs.s3a.endpoint = "http://seaweedfs:9000"
      fs.s3a.access-key = "admin"
      fs.s3a.secret-key = "adminsecret"
      fs.s3a.path.style.access = "true"
      fs.s3a.aws.credentials.provider = "org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider"
    }
  }
}

sink {
  Console {}
}
